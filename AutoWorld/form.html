<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWorld - Запись на тест-драйв</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="custom.css">
    <link rel="icon" href="img/favicon.ico" type="image/x-icon">
</head>
<body>
    <header class="bg-dark text-white py-3">
        <div class="container">
            <div class="d-flex flex-wrap align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <i class="fas fa-car fs-1 me-2 text-warning"></i>
                    <span class="fs-3 fw-bold">AutoWorld</span>
                </div>
                <div class="d-flex align-items-center">
    <nav>
        <ul class="nav">
            <li class="nav-item"><a href="index.html" class="nav-link text-white">Главная</a></li>
            <li class="nav-item"><a href="list.html" class="nav-link text-white">Автомобили</a></li>
            <li class="nav-item"><a href="form.html" class="nav-link text-white">Тест-драйв</a></li>
            <li class="nav-item"><a href="item.html" class="nav-link text-white">О модели</a></li>
        </ul>
    </nav>
    <!-- Иконка корзины с счётчиком -->
    <a href="cart.html" class="ms-3 text-white position-relative">
        <i class="fas fa-shopping-cart fs-4"></i>
        <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.7rem;">
            0
        </span>
    </a>
</div>
            </div>
        </div>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h2 class="mb-4 text-center">Запись на тест-драйв</h2>
                <form method="POST" action="">
                    <div class="mb-3">
                        <label for="name" class="form-label">Ваше имя</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Иван Иванов" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="ivan@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Телефон</label>
                        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+7 (999) 123-45-67" required>
                    </div>
                    <div class="mb-3">
                        <label for="car" class="form-label">Выберите автомобиль</label>
                        <select class="form-select" id="car" name="car" required>
                            <option value="" selected disabled>— Выберите —</option>
                            <option value="tesla">Tesla Model S</option>
                            <option value="bmw">BMW i4</option>
                            <option value="audi">Audi e-tron</option>
                            <option value="porsche">Porsche Taycan</option>
                            <option value="ford">Ford Mustang Mach-E</option>
                            <option value="hyundai">Hyundai Ioniq 6</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="date" class="form-label">Желаемая дата</label>
                        <input type="date" class="form-control" id="date" name="date" required>
                    </div>
                    <div class="mb-3">
                        <label for="time" class="form-label">Желаемое время</label>
                        <input type="time" class="form-control" id="time" name="time" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Записаться</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-4">
        <div class="container">
            <p class="mb-0">&copy; 2026 AutoWorld. Все права защищены.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // Функция добавления в корзину
    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        
        // Проверяем, есть ли уже такой товар
        const existingItem = cart.find(item => item.id === id);
        
        if (existingItem) {
            existingItem.quantity += 1;
        } else {
            cart.push({ id: id, name: name, price: price, quantity: 1 });
        }
        
        localStorage.setItem('cart', JSON.stringify(cart));
        
        // Обновляем счётчик
        updateCartCount();
        
        // Показываем уведомление
        alert(`✅ ${name} добавлен в корзину!`);
    }
    
    // Обновление счётчика корзины
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const cartCountSpan = document.getElementById('cartCount');
        if (cartCountSpan) {
            cartCountSpan.textContent = count;
        }
    }
    
    // Обновляем счётчик при загрузке страницы
    document.addEventListener('DOMContentLoaded', updateCartCount);
</script>
</body>
</html>
